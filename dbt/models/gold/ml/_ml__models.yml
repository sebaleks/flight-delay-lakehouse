version: 2

models:
  - name: ml_flight_features
    description: >
      THE ML feature mart (leakage boundary, CLAUDE.md §9): one wide flat row
      per completed flight (not cancelled, not diverted, labels present).
      Features are pre-departure-only: schedule attributes, shared
      training-window historical rates smoothed toward the global —
      (n*p + m*global)/(n+m), constant within an entity so no per-row channel
      exists, prior damping the single-flight case; NULL for entities new
      in the test window — never zero-filled), hourly ISD origin weather AT
      THE SCHEDULED DEPARTURE HOUR (the last observation at or before
      scheduled departure within a 3-hour staleness ceiling, UTC obs joined
      to local schedule via the seed tz; pinned at the value level by
      assert_ml_weather_obs_before_departure, has_origin_weather =
      in-window observation exists), and holiday flags. Labels carry the
      label_ prefix and are the only
      post-departure columns; assert_ml_features_no_leakage pins the schema
      to the audited column allowlist. Split on is_training_row (or
      flight_date) — never randomly; anyone carving a validation slice from
      the training window must re-derive hist_* as-of that slice.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - flight_date
              - carrier
              - flight_number
              - origin
              - dest
              - crs_dep_time
    columns:
      - name: flight_date
        tests: [not_null]
      - name: carrier
        tests: [not_null]
      - name: origin
        tests: [not_null]
      - name: dest
        tests: [not_null]
      - name: distance
        tests: [not_null]
      - name: crs_dep_hour
        description: Scheduled departure hour, local time, 0-23.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 23
      - name: day_of_week
        description: BTS convention, 1 = Monday .. 7 = Sunday.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6, 7]
                quote: false
      - name: crs_dep_time
        description: Scheduled departure time (local) — part of the natural key.
        tests: [not_null]
      - name: hist_route_arr_del15_rate
        description: >
          Training-window route delay rate from the shared model, smoothed
          toward the global rate with prior strength
          var('hist_smoothing_prior_strength') — identical for every row of a
          route, train and test (an earlier leave-one-out variant created a
          target-encoding artifact that handicapped tree models; it never
          inflated metrics). NULL when the route has no pre-cutoff flights.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
      - name: hist_dest_arr_del15_rate
        description: >
          OUTBOUND (origin-grain) delay rate of the destination airport — a
          congestion propensity proxy, not inbound arrival performance.
          Smoothed like every grain; the arriving flight is never in this
          aggregate, so it carries no self-inclusion at any n.
      - name: origin_visibility_mi
        description: >
          Visibility at the chosen observation, RIGHT-CENSORED at 10.0 (the
          ISD source caps VIS at 16093 m — 10.0 means "10 or better").
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 10.001
              config:
                severity: warn
      - name: origin_gust_kn
        description: >
          0.0 when the chosen observation reports no gust group (calm-hours
          encoding, owner decision — never NaN-imputed to a typical gust);
          origin_gust_reported carries the reported/absent distinction.
          NULL only when no observation exists (has_origin_weather false).
      - name: origin_precip_1h_in
        description: >
          1-hour accumulation ONLY (period-01 AA group): 0.0 when the
          observation carries no precip groups, NULL when only longer-period
          groups exist — accumulation windows are never mixed.
      - name: origin_weather_obs_ts_utc
        description: >
          Bookkeeping, NOT a feature (EXCLUDED in ml/features.py): UTC
          timestamp of the chosen observation, kept so
          assert_ml_weather_obs_before_departure can prove obs <= scheduled
          departure over the full table at any time.
      - name: is_training_row
        description: flight_date < var('train_test_cutoff_date'); the time-based split marker.
        tests: [not_null]
      - name: label_arr_del15
        description: Classification label — arrival delayed >= 15 minutes.
        tests: [not_null]
      - name: label_arr_delay_minutes
        description: Regression label — arrival delay in minutes (0 for early/on-time).
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
              config:
                severity: warn
