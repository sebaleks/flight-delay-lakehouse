version: 2

models:
  - name: stg_gold__flights
    description: >
      Gold staging over silver_flights: the column subset gold consumes plus
      shared derived keys (route, scheduled-hour buckets), defined once. One
      row per flight leg including cancelled/diverted.
    columns:
      - name: flight_date
        tests: [not_null]
      - name: origin
        tests: [not_null]
      - name: dest
        tests: [not_null]
      - name: carrier
        tests: [not_null]

  - name: stg_gold__weather
    description: >
      Daily GSOD weather keyed by airport via its nearest mapped station.
      Grain: (iata, obs_date); stations can gap on dates — LEFT JOIN and treat
      missing as signal.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [iata, obs_date]
          config:
            severity: warn
    columns:
      - name: iata
        tests: [not_null]
      - name: obs_date
        tests: [not_null]

  - name: int_historical_delay_rates
    description: >
      LEAKAGE-CRITICAL shared model: historical delay rates by route, carrier,
      and origin airport, computed exclusively on flights strictly before
      var('train_test_cutoff_date') (see dbt_project.yml — the single place
      the boundary lives). Both the analytics marts and the ML feature mart
      ref() this; nothing recomputes these rates. The ML mart consumes them
      smoothed toward the training-window global (prior strength
      var('hist_smoothing_prior_strength') — the definition still lives
      once). Entities first seen in the test window are absent by design —
      consumers keep the NULL. The airport level is ORIGIN-grain (flights
      departing).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [entity_level, entity_key]
    columns:
      - name: entity_level
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['route', 'carrier', 'airport']
      - name: entity_key
        tests: [not_null]
      - name: n_flights
        tests: [not_null]
      - name: arr_del15_rate
        description: Share of completed pre-cutoff flights arriving >= 15 min late.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
