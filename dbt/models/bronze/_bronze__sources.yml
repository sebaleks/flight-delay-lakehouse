# Bronze sources = the raw inputs dbt reads FROM. Nothing is materialized here.
#
# - BTS: BigQuery EXTERNAL TABLE over the immutable bronze CSVs in GCS
#   (created by ingestion/ or `bq mk --external_table_definition`),
#   living in the bronze dataset ({{ env_var('BQ_BRONZE_DATASET') }}).
# - NOAA GSOD: read in place from the public dataset (no copy into bronze).
# - airports / holidays: dbt SEEDS, not sources — reference them with
#   {{ ref('airports') }} / {{ ref('holidays') }} and never redeclare them
#   here: a seed refresh over a same-named external table would clobber it.
#   Decision + tradeoff in dbt/seeds/README.md.

version: 2

sources:
  - name: bronze
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: "{{ env_var('BQ_BRONZE_DATASET', 'flight_delays_bronze') }}"
    description: "Immutable raw layer — external tables over GCS CSV."
    tables:
      - name: bts_on_time_performance
        meta:
          dagster:
            # wires dbt lineage to the orchestration layer: models reading
            # this source depend on the bts_external_table asset (which
            # depends on bts_bronze)
            asset_key: ["bts_external_table"]
        description: >
          BTS On-Time Performance 2022-2024, external table over the bronze
          CSVs (hive-partitioned year/month; created by
          ingestion/bts_external_table.py). All file columns are STRING —
          silver casts. Quirks: the file's Year/Month columns are exposed as
          Year_file/Month_file (they collide with the hive partition keys —
          use the `year`/`month` partition columns instead), and the BTS
          trailing-comma column is exposed as `trailing_empty` (ignore).

      - name: isd_hourly
        meta:
          dagster:
            # lineage hook for the orchestration layer (asset added when the
            # ISD path is wired into Dagster; until then this is an external
            # upstream, which `dagster definitions validate` accepts)
            asset_key: ["isd_external_table"]
        description: >
          NOAA ISD Global Hourly observations 2022-2024 for the 1,165 mapped
          stations, external table over the bronze NDJSON ACCESS LAYER
          (bronze/isd_hourly_jsonl/, hive-partitioned by year; created by
          ingestion/isd_external_table.py). The raw record is the station-year
          CSVs under bronze/isd_hourly/ — heterogeneous per-station columns
          rule out a CSV external table, so a values-verbatim NDJSON projection
          is derived for BigQuery consumption. All fields STRING and PACKED
          (e.g. TMP "-0194,5" = value*10 + QC code); silver decodes.
          `_station_id` ("USAF-WBAN") is injected from file identity at
          conversion — use it, not STATION, which can drop leading zeros.

  - name: noaa
    database: "bigquery-public-data"
    schema: "noaa_gsod"
    description: "NOAA GSOD daily weather, read in place from BigQuery public data."
    tables:
      - name: gsod2022
      - name: gsod2023
      - name: gsod2024
      - name: stations
