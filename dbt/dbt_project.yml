name: "flight_delays"
version: "1.0.0"
config-version: 2

# Uses the "flight_delays" profile in ./dbt/profiles.yml (BigQuery, ADC).
profile: "flight_delays"

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Dataset names come from env vars so bronze/silver/gold are separate BigQuery
# datasets. generate_schema_name.sql maps +schema to the dataset name verbatim.
models:
  flight_delays:
    silver:
      # native tables per CLAUDE.md §3 — a view here would re-scan the bronze
      # GCS CSVs on every downstream query
      +materialized: table
      +schema: "{{ env_var('BQ_SILVER_DATASET', 'flight_delays_silver') }}"
    gold:
      +materialized: table
      +schema: "{{ env_var('BQ_GOLD_DATASET', 'flight_delays_gold') }}"
      star:
        # fact_flights, dim_airport, dim_carrier, dim_date
        +materialized: table
      ml:
        # wide, flat one-row-per-flight feature mart (pre-departure features only)
        +materialized: table

# ---------------------------------------------------------------------------
# TRAIN/TEST BOUNDARY (leakage-critical — CLAUDE.md §9: time-based, never
# random). Training window: 2022-01-01 (data start) up to but EXCLUDING this
# date; test window: this date through 2024-12-31 (~last 6 months, ≈17%).
# The shared historical-delay-rate model (int_historical_delay_rates) filters
# on this var so no test-period outcome can leak backward into a feature, and
# ml_flight_features derives its is_training_row column from the same value.
# Change it HERE only — no model may inline a cutoff literal.
# ---------------------------------------------------------------------------
vars:
  train_test_cutoff_date: "2024-07-01"
  # Prior strength for the ML mart's historical-rate smoothing:
  # hist = (n*entity_rate + m*global_rate) / (n + m). Constant within an
  # entity (no per-row adjustment of any kind), and a single-flight entity's
  # own outcome carries only 1/(1+m) weight — the case that once motivated
  # the (since removed) leave-one-out correction.
  hist_smoothing_prior_strength: 50

# Static reference (airport coords/tz, holiday calendar) can land here as seeds.
seeds:
  flight_delays:
    +schema: "{{ env_var('BQ_BRONZE_DATASET', 'flight_delays_bronze') }}"
